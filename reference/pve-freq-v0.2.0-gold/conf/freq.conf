# freq.conf — PVE FREQ Configuration
# DC01 Datacenter · LOW FREQ Labs
# v0.2.0 "The Convergence" — bash+Python bridge prototype

# ═══════════════════════════════════════════════════════════════════
# [version]
# ═══════════════════════════════════════════════════════════════════
FREQ_VERSION="0.2.0"
FREQ_BRAND="LOW FREQ Labs"

# Personality pack: controls celebrations, taglines, vibes, subtitle
# Available packs: personal (bass/dubstep theme), enterprise (professional)
# Packs live in: conf/personality/<name>.conf
# To create a new pack: copy personal.conf and modify
FREQ_BUILD="${FREQ_BUILD:-personal}"

# Terminal compatibility (PuTTY-safe)
# 1 = ASCII box drawing (works everywhere including PuTTY)
# 0 = Unicode box drawing (requires UTF-8 terminal)
FREQ_ASCII="${FREQ_ASCII:-1}"
# Override terminal width if auto-detection fails
# FREQ_WIDTH=80

# Debug mode: set to 1 for verbose output + set -x tracing
# Can also be enabled with `freq --debug <command>`
FREQ_DEBUG="${FREQ_DEBUG:-0}"

# ═══════════════════════════════════════════════════════════════════
# [engine] — Python remediation engine (v2.0.0)
# ═══════════════════════════════════════════════════════════════════
FREQ_ENGINE_ENABLED="${FREQ_ENGINE_ENABLED:-1}"
FREQ_ENGINE_MAX_PARALLEL="${FREQ_ENGINE_MAX_PARALLEL:-5}"
FREQ_ENGINE_DB="${FREQ_DATA_DIR:-/opt/pve-freq/data}/engine/results.db"

# ═══════════════════════════════════════════════════════════════════
# [paths] — All paths relative to FREQ_DIR
# FREQ_DIR is auto-detected by the entry point (freq)
# ═══════════════════════════════════════════════════════════════════
FREQ_DIR="/opt/pve-freq"
FREQ_DATA_DIR="${FREQ_DIR}/data"
FREQ_LOG="${FREQ_DIR}/data/log/freq.log"
FREQ_PROTECTED_LOG="${FREQ_DIR}/data/log/protected-ops.log"
FREQ_LOCK="${FREQ_DIR}/.freq.lock"
FREQ_TEMPLATE_DIR="${FREQ_DIR}/conf/tpl"
HOSTS_FILE="${FREQ_DIR}/conf/hosts.conf"
USERS_FILE="${FREQ_DIR}/conf/users.conf"
ROLES_FILE="${FREQ_DIR}/conf/roles.conf"
GROUPS_FILE="${FREQ_DIR}/conf/groups.conf"

# Credential files (admin-only, readable by root)
ROOT_PASS_FILE="${FREQ_DATA_DIR}/root-pass"
SVC_PASS_FILE="${FREQ_DATA_DIR}/svc-pass"

# Service account — used for fleet-wide SSH, elevated ops, and freq init
FREQ_SERVICE_ACCOUNT="${FREQ_SERVICE_ACCOUNT:-svc-admin}"

# ═══════════════════════════════════════════════════════════════════
# [ssh]
# ═══════════════════════════════════════════════════════════════════
REMOTE_USER="${FREQ_SERVICE_ACCOUNT}"
SSH_CONNECT_TIMEOUT=5
MAX_PARALLEL=5
FREQ_SSH_KEY="${FREQ_DIR}/data/keys/freq_id_rsa"

# SSH mode for PVE node access:
#   "root"  = SSH as root@node directly (PVE default, no sudo needed)
#   "sudo"  = SSH as PVE_SSH_USER@node, wrap commands in sudo
FREQ_SSH_MODE="sudo"

# ═══════════════════════════════════════════════════════════════════
# [pve] — Proxmox cluster nodes
# ═══════════════════════════════════════════════════════════════════
PVE_NODES=("10.25.255.26" "10.25.255.27" "10.25.255.28")
PVE_NODE_NAMES=("pve01" "pve02" "pve03")
PVE_SSH_USER="${FREQ_SERVICE_ACCOUNT}"

# Storage mapping per node (ZFS pool names)
declare -A NODE_STORAGE=(
    [pve01]="os-drive-hdd"
    [pve02]="os-pool-ssd"
    [pve03]="os-drive-ssd"
)
declare -A NODE_STORAGE_TYPE=(
    [pve01]="HDD"
    [pve02]="SSD"
    [pve03]="SSD"
)

# Rescue/migration storage
ISO_STORAGE="iso-storage"
PARK_STORAGE="truenas-os-drive"
RESCUE_DIR="${FREQ_DATA_DIR}/rescue"

# ═══════════════════════════════════════════════════════════════════
# [cloud] — Cloud image definitions
# ═══════════════════════════════════════════════════════════════════
CLOUD_IMG_DIR="/mnt/iso-share/template/cloud"
ISO_STORAGE_MOUNT="/mnt/iso-share"

# Cloud image definitions (external config)
[ -f "${FREQ_DIR}/conf/distros.conf" ] && source "${FREQ_DIR}/conf/distros.conf"

# ═══════════════════════════════════════════════════════════════════
# [vm_defaults] — New VM provisioning defaults
# ═══════════════════════════════════════════════════════════════════
VM_DEFAULT_CORES=2
VM_DEFAULT_RAM=2048
VM_DEFAULT_DISK=32
VM_CPU="x86-64-v2-AES"
VM_MACHINE="q35"
VM_SCSIHW="virtio-scsi-single"
VM_BIOS="ovmf"
VM_DOMAIN="dc01.local"
VM_GATEWAY="10.25.0.1"
VM_NAMESERVER="1.1.1.1"
VM_CIUSER="${FREQ_SERVICE_ACCOUNT}"

# IP pool for new VMs
IP_POOL_START=200
IP_POOL_END=250
IP_PREFIX="10.25.0"
IP_SUBNET="/24"

# ═══════════════════════════════════════════════════════════════════
# [templates] — PVE template profiles and VMID range
# ═══════════════════════════════════════════════════════════════════
declare -A TEMPLATE_PROFILES=(
    [minimal]="1:1024:8"
    [standard]="2:2048:32"
    [dev]="4:4096:64"
    [prod]="4:8192:128"
    [docker]="4:4096:64"
)

TEMPLATE_VMID_START=9000
TEMPLATE_VMID_END=9499

# ═══════════════════════════════════════════════════════════════════
# [pfsense] — pfSense integration
# ═══════════════════════════════════════════════════════════════════
PFSENSE_HOST="10.25.255.1"
PFSENSE_USER="root"
PFSENSE_CONFIG="/cf/conf/config.xml"

# ═══════════════════════════════════════════════════════════════════
# [users] — User management conventions
# ═══════════════════════════════════════════════════════════════════
SVC_UID=3003
SVC_GID=950
FREQ_GROUP="${FREQ_GROUP:-freq-group}"
UID_MIN=3000
UID_MAX=3999
RESERVED_UIDS="3003"
PRIV_ACCOUNTS="root ${FREQ_SERVICE_ACCOUNT}"

# ═══════════════════════════════════════════════════════════════════
# [dc01] — Standard datacenter configuration
# ═══════════════════════════════════════════════════════════════════
DC01_TIMEZONE="America/Chicago"
FREQ_PACKAGES=(htop curl wget net-tools)

# ═══════════════════════════════════════════════════════════════════
# [nic] — Network configuration
# ═══════════════════════════════════════════════════════════════════
NIC_BRIDGE="vmbr0"
NIC_MTU=1500
# VLAN, NIC, and provisioner config (external config)
[ -f "${FREQ_DIR}/conf/vlans.conf" ] && source "${FREQ_DIR}/conf/vlans.conf"

# ═══════════════════════════════════════════════════════════════════
# [onboard] — SSH keys deployed to new hosts during onboarding
# ═══════════════════════════════════════════════════════════════════
ONBOARD_ROOT_PUBKEY=""
ONBOARD_SVC_PUBKEY=""

# ═══════════════════════════════════════════════════════════════════
# [safety] — Operational safety thresholds
# ═══════════════════════════════════════════════════════════════════
MAX_FAILURE_PERCENT=50

# ═══════════════════════════════════════════════════════════════════
# [vault] — Encrypted credential storage
# ═══════════════════════════════════════════════════════════════════
VAULT_DIR="${FREQ_DIR}/data/vault"
VAULT_FILE="${FREQ_DIR}/data/vault/freq-vault.enc"

# ═══════════════════════════════════════════════════════════════════
# [wazuh] — Wazuh SIEM integration
# ═══════════════════════════════════════════════════════════════════
WAZUH_MANAGER_IP=""
WAZUH_API_PORT="55000"
WAZUH_API_USER="wazuh"
WAZUH_API_PASS_VAULT_KEY="wazuh-api-pass"

# ═══════════════════════════════════════════════════════════════════
# [generic] — Generic Edition Configuration
# ═══════════════════════════════════════════════════════════════════
FREQ_CLUSTER_NAME="${FREQ_CLUSTER_NAME:-DC01}"
FREQ_INFRA_NAME="${FREQ_INFRA_NAME:-DC01}"
FREQ_TIMEZONE="${FREQ_TIMEZONE:-$(timedatectl show --property=Timezone --value 2>/dev/null || echo UTC)}"
TRUENAS_IP="${TRUENAS_IP:-10.25.255.25}"
TRUENAS_LAB_IP="${TRUENAS_LAB_IP:-10.25.255.181}"
PFSENSE_IP="${PFSENSE_IP:-10.25.255.1}"
PFSENSE_LAB_IP="${PFSENSE_LAB_IP:-10.25.255.180}"
MGMT_SUBNET="${MGMT_SUBNET:-10.25.255.0/24}"
BACKUP_DIR="${BACKUP_DIR:-/mnt/obsidian}"
FLEET_PUID="${FLEET_PUID:-3000}"
FLEET_PGID="${FLEET_PGID:-950}"

# ── Notifications ────────────────────────────────────────────────
DISCORD_WEBHOOK=""
DISCORD_BOT_TOKEN=""
SLACK_WEBHOOK=""
SLACK_BOT_TOKEN=""
NOTIFY_CHANNEL_ID=""

# ── OPNsense ─────────────────────────────────────────────────────
OPNSENSE_API_PORT="443"
OPNSENSE_LAB_HOST="10.25.255.180"
OPNSENSE_HOST=""
MEDIA_ENABLED=true

# ═══════════════════════════════════════════════════════════════════
# [pdm] — Proxmox Datacenter Manager
# ═══════════════════════════════════════════════════════════════════
PDM_ENABLED=true
PDM_FALLBACK_SSH=true
PDM_CACHE_TTL=60

# ═══════════════════════════════════════════════════════════════════
# [safety_gates] — Protected VMID list
# ═══════════════════════════════════════════════════════════════════
PROTECTED_VMIDS=(100 101 102 103 104 201 202 301 400 666 802 804 811 999)
# Protected ranges
PROTECTED_PROD_RANGE_START=900
PROTECTED_PROD_RANGE_END=999
PROTECTED_TEMPLATE_RANGE_START=9000
PROTECTED_TEMPLATE_RANGE_END=9999
