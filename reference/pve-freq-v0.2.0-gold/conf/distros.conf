# Support tiers for template setup
# priority   = LTS/stable, templated by default
# supported  = older LTS, templated on request
# besteffort = EOL or niche, no guarantees
# rolling    = rolling release, snapshot-based
declare -A DISTRO_TIER=(
    [ubuntu-2404]="priority"
    [debian-13]="priority"
    [rocky-9]="priority"
    [alma-9]="priority"
    [centos-stream-9]="priority"
    [fedora-42]="priority"
    [ubuntu-2204]="supported"
    [debian-12]="supported"
    [rocky-8]="supported"
    [alma-8]="supported"
    [fedora-41]="supported"
    [ubuntu-2004]="besteffort"
    [debian-11]="besteffort"
    [fedora-40]="besteffort"
    [arch]="rolling"
    [opensuse-15]="rolling"
)

