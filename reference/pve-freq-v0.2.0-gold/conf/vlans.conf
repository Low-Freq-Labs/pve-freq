# =============================================================================
# FREQ -- conf/vlans.conf
# VLAN, NIC profile, and provisioner range definitions
# =============================================================================

declare -A VLAN_NAMES=(
    [0]="LAN"
    [5]="PUBLIC"
    [25]="STORAGE"
    [66]="DIRTY"
    [2550]="MGMT"
)
declare -A VLAN_SUBNETS=(
    [0]="10.25.0.0/24"
    [5]="10.25.5.0/24"
    [25]="10.25.25.0/24"
    [66]="10.25.66.0/24"
    [2550]="10.25.255.0/24"
)
declare -A VLAN_PREFIXES=(
    [0]="10.25.0"
    [5]="10.25.5"
    [25]="10.25.25"
    [66]="10.25.66"
    [2550]="10.25.255"
)
VLAN_GATEWAY="10.25.0.1"

# Gateway per VLAN — only VLANs with internet access have a gateway
# Used by cloud-init: the VLAN with a gateway becomes the default route
declare -A VLAN_GATEWAYS=(
    [5]="10.25.5.1"
    [66]="10.25.66.1"
)

# Standard NIC profiles for onboarding
# Format: "net0_vlan,net1_vlan,net2_vlan,..." — NICs added in order
# MGMT is always required. STORAGE is standard. PUBLIC is optional.
declare -A NIC_PROFILES=(
    [standard]="2550,25"
    [public]="2550,25,5"
    [dirty]="66,2550,25"
    [minimal]="2550"
)

# IP ranges per provisioner (last octet)
declare -A PROVISIONER_RANGES=(
    [sonny]="25-50"
    [chris]="51-75"
    [donny]="76-100"
    [other]="101-249"
)

