services:
  freq:
    build: .
    container_name: pve-freq
    restart: unless-stopped
    ports:
      - "${FREQ_PORT:-8888}:8888"
    volumes:
      - ./conf:/opt/pve-freq/conf
      - ./data:/opt/pve-freq/data
      # Uncomment and adjust to mount your SSH key:
      # - ~/.ssh/id_ed25519:/home/freq/.ssh/id_ed25519:ro
      # - ~/.ssh/known_hosts:/home/freq/.ssh/known_hosts:ro
    environment:
      - TZ=${TZ:-UTC}
      - FREQ_PORT=8888
