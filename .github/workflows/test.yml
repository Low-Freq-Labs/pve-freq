name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os:
          # ── Debian family ──
          - 'debian:12'
          - 'debian:13'
          - 'debian:sid'
          # ── Ubuntu ──
          - 'ubuntu:24.04'
          - 'ubuntu:25.04'
          # ── RHEL family ──
          - 'rockylinux:8'
          - 'rockylinux:9'
          - 'almalinux:8'
          - 'almalinux:9'
          - 'quay.io/centos/centos:stream9'
          - 'oraclelinux:8'
          - 'oraclelinux:9'
          # ── Fedora ──
          - 'fedora:40'
          - 'fedora:41'
          - 'fedora:42'
          # ── Arch (rolling) ──
          - 'archlinux:latest'
          # ── SUSE ──
          - 'opensuse/tumbleweed:latest'
          # ── Alpine (musl libc) ──
          - 'alpine:3.19'
          - 'alpine:3.20'
          - 'alpine:3.21'
    container:
      image: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Python and pytest
        shell: sh
        run: |
          # Detect package manager and install Python 3.11+, pip, pytest, openssh, openssl
          if command -v xbps-install >/dev/null 2>&1; then
            # Void Linux
            xbps-install -Sy python3 python3-pip openssh openssl
          elif command -v apt-get >/dev/null 2>&1; then
            # Debian, Ubuntu
            apt-get update -qq
            apt-get install -y -qq python3 python3-pip openssh-client openssl
          elif command -v dnf >/dev/null 2>&1; then
            # RHEL family: Rocky, Alma, Oracle, CentOS Stream, Amazon Linux, Fedora
            if dnf list python3.11-pip >/dev/null 2>&1; then
              # RHEL 8/9 clones — python3.11 from AppStream
              dnf install -y -q python3.11 python3.11-pip openssh-clients openssl
              alternatives --set python3 /usr/bin/python3.11 2>/dev/null || \
                ln -sf /usr/bin/python3.11 /usr/local/bin/python3
              ln -sf /usr/bin/pip3.11 /usr/local/bin/pip3 2>/dev/null || true
            else
              # Fedora, Amazon Linux 2023, or distro with python3 already 3.11+
              dnf install -y -q python3 python3-pip openssh-clients openssl
            fi
          elif command -v yum >/dev/null 2>&1; then
            # Legacy yum (fallback)
            yum install -y python3 python3-pip openssh-clients openssl
          elif command -v pacman >/dev/null 2>&1; then
            # Arch
            pacman -Sy --noconfirm python python-pip openssh openssl
          elif command -v zypper >/dev/null 2>&1; then
            # openSUSE (Tumbleweed + Leap)
            zypper --non-interactive install python3 python3-pip openssh-clients openssl
          elif command -v apk >/dev/null 2>&1; then
            # Alpine (musl) — needs bash for install script tests
            apk add --no-cache python3 py3-pip openssh-client openssl bash
          fi
          # Install pytest + build — handle PEP 668 (externally-managed) gracefully
          pip3 install --break-system-packages pytest build 2>/dev/null || pip3 install pytest build

      - name: Verify Python version
        shell: sh
        run: |
          python3 --version
          python3 -c "import sys; assert sys.version_info >= (3, 11), f'Python 3.11+ required, got {sys.version}'"

      - name: Install package
        shell: sh
        run: |
          # Install pve-freq from source (no external deps)
          pip3 install --break-system-packages --no-deps . 2>/dev/null || pip3 install --no-deps .

      - name: Verify freq --version
        shell: sh
        run: |
          freq --version

      - name: Verify freq doctor runs
        shell: sh
        run: |
          # Doctor runs 15 self-checks. SSH/PVE checks will fail in CI (no infra)
          # but the command must not crash. Exit 0 = all pass, exit 1 = some fail (expected in CI).
          freq doctor || true
        env:
          FREQ_DIR: ${{ github.workspace }}

      - name: Verify freq init --dry-run
        shell: sh
        run: |
          # Dry-run previews what init would do — no root, no network, always exits 0
          freq init --dry-run
        env:
          FREQ_DIR: ${{ github.workspace }}

      - name: Verify freq init --check
        shell: sh
        run: |
          # Check validates local init state. Fails in CI (no freq.toml, no keys) but must not crash.
          freq init --check || true
        env:
          FREQ_DIR: ${{ github.workspace }}

      - name: Lint
        shell: sh
        run: pip3 install --break-system-packages ruff 2>/dev/null || pip3 install ruff && ruff check freq/ --exit-zero

      - name: Run tests with coverage
        shell: sh
        run: |
          pip3 install --break-system-packages pytest-cov 2>/dev/null || pip3 install pytest-cov
          python3 -m pytest tests/ -v --tb=short --cov=freq --cov-report=term-missing --cov-fail-under=20
        env:
          FREQ_DIR: ${{ github.workspace }}

      - name: Verify package data
        shell: sh
        run: |
          python3 -c "from freq.data import get_data_path; p = get_data_path(); assert (p / 'conf-templates' / 'freq.toml.example').exists(), 'Missing package data'"
        env:
          FREQ_DIR: ${{ github.workspace }}

      - name: Build wheel
        shell: sh
        run: |
          python3 -m build --wheel --outdir dist/

      - name: Install from wheel
        shell: sh
        run: |
          # Uninstall source install, reinstall from built wheel
          pip3 install --break-system-packages --force-reinstall --no-deps dist/*.whl 2>/dev/null || \
            pip3 install --force-reinstall --no-deps dist/*.whl
          # Verify the wheel-installed package works
          freq --version
