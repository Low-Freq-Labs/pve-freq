name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os:
          # Debian family
          - 'debian:12'
          - 'debian:13'
          # Ubuntu
          - 'ubuntu:24.04'
          - 'ubuntu:24.10'
          # RHEL family
          - 'rockylinux:9'
          - 'almalinux:9'
          - 'fedora:41'
          - 'fedora:40'
          # Arch
          - 'archlinux:latest'
          # SUSE
          - 'opensuse/tumbleweed:latest'
          # Alpine
          - 'alpine:3.21'
    container:
      image: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Python and pytest
        shell: sh
        run: |
          # Detect package manager and install Python 3.11+, pip, pytest, openssh
          if command -v apt-get >/dev/null 2>&1; then
            # Debian, Ubuntu
            apt-get update -qq
            apt-get install -y -qq python3 python3-pip openssh-client
          elif command -v dnf >/dev/null 2>&1; then
            # Fedora ships python3 as 3.12+, Rocky/Alma 9 default to 3.9
            # Try python3.11 first (RHEL AppStream), fall back to python3
            if dnf list python3.11 >/dev/null 2>&1; then
              dnf install -y -q python3.11 python3.11-pip openssh-clients
              # Make python3.11 the default python3
              alternatives --set python3 /usr/bin/python3.11 2>/dev/null || \
                ln -sf /usr/bin/python3.11 /usr/local/bin/python3
              ln -sf /usr/bin/pip3.11 /usr/local/bin/pip3 2>/dev/null || true
            else
              dnf install -y -q python3 python3-pip openssh-clients
            fi
          elif command -v pacman >/dev/null 2>&1; then
            # Arch
            pacman -Sy --noconfirm python python-pip openssh
          elif command -v zypper >/dev/null 2>&1; then
            # openSUSE
            zypper --non-interactive install python3 python3-pip openssh-clients
          elif command -v apk >/dev/null 2>&1; then
            # Alpine
            apk add --no-cache python3 py3-pip openssh-client
          fi
          # Install pytest — handle PEP 668 (externally-managed) gracefully
          pip3 install --break-system-packages pytest 2>/dev/null || pip3 install pytest

      - name: Verify Python version
        shell: sh
        run: |
          python3 --version
          python3 -c "import sys; assert sys.version_info >= (3, 11), f'Python 3.11+ required, got {sys.version}'"

      - name: Run tests
        shell: sh
        run: python3 -m pytest tests/ -v --tb=short
        env:
          FREQ_DIR: ${{ github.workspace }}

      - name: Verify package data
        shell: sh
        run: |
          python3 -c "from freq.data import get_data_path; p = get_data_path(); assert (p / 'conf-templates' / 'freq.toml.example').exists(), 'Missing package data'"
        env:
          FREQ_DIR: ${{ github.workspace }}
