name: Release

on:
  push:
    tags: ['v*']

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: ['debian:13', 'debian:12', 'ubuntu:24.04', 'rockylinux:9']
    container:
      image: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        run: |
          if command -v apt-get &>/dev/null; then
            apt-get update -qq && apt-get install -y -qq python3 openssh-client
          elif command -v dnf &>/dev/null; then
            dnf install -y -q python3 openssh-clients
          fi

      - name: Install from local
        run: bash install.sh --from-local . --yes --skip-doctor

      - name: Verify install
        run: |
          freq --version
          freq doctor || true

      - name: Run tests
        run: python3 -m pytest tests/test_install.py -v

  release:
    name: Create Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create tarball
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          tar czf pve-freq-${VERSION}.tar.gz \
            --transform "s,^,pve-freq-${VERSION}/," \
            freq/ conf/*.example conf/plugins/ conf/playbooks/ \
            contrib/ docs/ \
            pyproject.toml install.sh README.md LICENSE CHANGELOG.md \
            ARCHITECTURE.md CONTRIBUTING.md SECURITY.md \
            Dockerfile docker-compose.yml docker-entrypoint.sh \
            --exclude='__pycache__' --exclude='*.pyc'
          sha256sum pve-freq-${VERSION}.tar.gz > pve-freq-${VERSION}.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pve-freq-*.tar.gz
            pve-freq-*.sha256
            install.sh
          generate_release_notes: true

  docker:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: lowfreqlabs/pve-freq:${{ github.ref_name }}
