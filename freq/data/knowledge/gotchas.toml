# FREQ Knowledge Base — Gotchas
# Quick-reference "watch out for this" entries with fixes.

[[gotcha]]
platform = "pfsense"
trigger = "reboot"
description = "pfSense firmware updates wipe /etc/sshd and sudoers. Verify SSH config after any update."
fix = "Re-apply sshd_config from backup. Verify sudo works."

[[gotcha]]
platform = "pfsense"
trigger = "LACP"
description = "LACP transition during reboot can errdisable switch ports. Must pre-configure switch before host."
fix = "Switch: errdisable recovery 30. Pre-enable channel-group."

[[gotcha]]
platform = "truenas"
trigger = "REST API"
description = "REST API deprecated in TrueNAS 25.10, removed in 26.04. Use midclt via SSH instead."
fix = "Replace _tn_api() with midclt call over SSH."

[[gotcha]]
platform = "docker"
trigger = "gluetun"
description = "qBit/FlareSolverr ports go on Gluetun container, NOT on the service containers."
fix = "network_mode: service:gluetun on qBit. All ports on gluetun service."

[[gotcha]]
platform = "pve"
trigger = "yescrypt"
description = "PVE uses yescrypt ($y$) by default which breaks SSH. Use chpasswd -c SHA512 for $6$ hashes."
fix = "chpasswd -c SHA512 <<< 'user:password'"

[[gotcha]]
platform = "nfs"
trigger = "stale handle"
description = "NFS stale file handle (errno 116) blocks all I/O on that mount. Processes hang in D-state."
fix = "Kill processes: fuser -km /mount. Lazy umount: umount -l. Remount fresh."

[[gotcha]]
platform = "nfs"
trigger = "fstab boot"
description = "Missing _netdev in fstab causes NFS mount attempt before network is up. Boot hangs for 90s."
fix = "Add _netdev,nofail,soft,timeo=150,retrans=3,bg to all NFS fstab entries."

[[gotcha]]
platform = "docker"
trigger = "bind mount empty"
description = "Docker bind mount to NFS path shows empty if NFS not mounted yet."
fix = "Use RequiresMountsFor=/mnt/nfs in docker service unit."

[[gotcha]]
platform = "docker"
trigger = "compose restart"
description = "docker compose restart does not pick up env file changes."
fix = "docker compose down && docker compose up -d. Never use restart for config changes."

[[gotcha]]
platform = "pve"
trigger = "pmxcfs lock"
description = "/etc/pve FUSE mount locks during cluster partition. VMs cannot be modified."
fix = "Fix quorum first. Maintain 3-node cluster."

[[gotcha]]
platform = "ssh"
trigger = "host key changed"
description = "VM rebuild with same IP triggers MITM warning. SSH refuses connection."
fix = "ssh-keygen -R <ip>. Or StrictHostKeyChecking=accept-new for automation."

[[gotcha]]
platform = "network"
trigger = "MTU path"
description = "Jumbo frames (MTU 9000) on only part of the path causes silent drops."
fix = "Verify MTU end-to-end: ip link show on every hop."

[[gotcha]]
platform = "linux"
trigger = "unattended reboot"
description = "apt unattended-upgrades defaults to Automatic-Reboot true on some distros."
fix = "Set Unattended-Upgrade::Automatic-Reboot false in 50unattended-upgrades."

[[gotcha]]
platform = "truenas"
trigger = "sudoers wipe"
description = "TrueNAS firmware updates wipe /usr/local/etc/sudoers.d/."
fix = "Use midclt call user.update to set sudo in middleware DB."

[[gotcha]]
platform = "idrac"
trigger = "Ed25519 key"
description = "iDRAC firmware rejects Ed25519 SSH keys. Only RSA keys work."
fix = "Generate RSA-4096 key specifically for iDRAC."
